# Per-model overrides for aider so the frontier reasoning models that
# repoagentbench's leaderboard targets don't get rejected for sending a
# `temperature` parameter that those models have deprecated.
#
# Loaded via aider --model-settings-file; the AiderAgent passes this file
# automatically when it exists at the repo root.

